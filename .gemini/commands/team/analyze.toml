description = "🧠 Phase 2: Analyze — Spawn SA thiết kế → QA review chất lượng → SA bổ sung nếu cần"

prompt = """
Bạn là Orchestrator. Thực hiện Phase 2: ANALYSIS & ARCHITECTURE.

## Yêu cầu bổ sung từ User:
{{args}}

## Điều kiện tiên quyết:
Phase 1 phải đã hoàn thành. Kiểm tra tồn tại: `docs/VISION.md` và `docs/PRODUCT_BACKLOG.md`.

## Hành động — SPAWN SUBAGENTS TUẦN TỰ:

### Bước 1: Spawn SA Agent
Gọi tool **sa-agent** với query:
"Đọc `docs/VISION.md` và `docs/PRODUCT_BACKLOG.md`, sau đó thiết kế hệ thống:

1. Tạo `docs/ARCHITECTURE.md` — kiến trúc tổng quan với sơ đồ Mermaid, layers, components, patterns
2. Tạo `docs/TECH_STACK.md` — ADR, so sánh tech, database schema, API design
3. Tạo `docs/IMPLEMENTATION_PLAN.md` — chia Sprint, task breakdown, dependencies, risk assessment
4. Viết `docs/HANDOFF.md` theo template Handoff khi hoàn thành

Viết bằng tiếng Việt. KHÔNG viết code — chỉ thiết kế."

### Bước 2: Spawn QA Agent (Review chất lượng tài liệu)
Sau khi SA Agent trả về, gọi tool **qa-agent** với query:
"Review chất lượng các tài liệu phân tích vừa được SA tạo:

Đọc và đánh giá:
- `docs/ARCHITECTURE.md` — kiến trúc có rõ ràng, đầy đủ components, có sơ đồ?
- `docs/TECH_STACK.md` — ADR có hợp lý, có so sánh alternatives?
- `docs/IMPLEMENTATION_PLAN.md` — Sprint plan có khả thi, task breakdown có đủ chi tiết?

Viết `docs/QA_REVIEW.md` với:
## Đánh giá chất lượng tài liệu
## ✅ Đạt yêu cầu
## ⚠️ Cần bổ sung / sửa chữa
## 🔴 Issues nghiêm trọng

Viết bằng tiếng Việt."

### Bước 3: Nếu QA phát hiện issues nghiêm trọng
Đọc `docs/QA_REVIEW.md`. Nếu có mục "🔴 Issues nghiêm trọng", spawn lại **sa-agent** với query:
"Đọc `docs/QA_REVIEW.md` và sửa lại các tài liệu theo feedback của QA. Cập nhật HANDOFF.md."

### Bước 4: Git Commit
Sau khi hoàn tất, chạy lệnh shell:
```
git add -A && git commit -m "phase2(analyze): SA thiết kế Architecture + Plan, QA reviewed"
```

## Sau khi hoàn tất:
- Tóm tắt cho User: Architecture decisions, Sprint plan, kết quả QA review
- Đề xuất approve để sang Phase 3 (Implement)

## Quy tắc:
- PHẢI spawn sa-agent rồi qa-agent, KHÔNG tự làm
- PHẢI git commit khi hoàn thành workflow
- Viết bằng tiếng Việt
"""
