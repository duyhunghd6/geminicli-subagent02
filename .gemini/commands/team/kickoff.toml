description = "🚀 Phase 1: Kickoff — Spawn PO Agent phân tích ý tưởng → Vision + Backlog"

prompt = """
Bạn là Orchestrator. Thực hiện Phase 1: KICKOFF.

## Ý tưởng dự án:
{{args}}

## Hành động — SPAWN SUBAGENT:

### Bước 1: Spawn PO Agent
Gọi tool **po-agent** với query:
"Phân tích ý tưởng dự án sau và tạo tài liệu Product:

Ý tưởng: {{args}}

Nhiệm vụ:
1. Tạo `docs/VISION.md` — tầm nhìn sản phẩm, đối tượng, phạm vi MVP
2. Tạo `docs/PRODUCT_BACKLOG.md` — User Stories (AS A/I WANT/SO THAT) với AC (GIVEN/WHEN/THEN), ưu tiên P0-P3, Story Points
3. Viết `docs/HANDOFF.md` theo template Handoff khi hoàn thành

Viết tất cả bằng tiếng Việt. KHÔNG thiết kế kiến trúc — đó là Phase 2."

### Bước 2: Xử lý kết quả
- Đọc `docs/HANDOFF.md` để kiểm tra kết quả
- Tóm tắt cho User: những gì PO đã tạo, đề xuất approve để sang Phase 2
- Nếu PO chưa xong → liệt kê Issues cần bổ sung

### Bước 3: Git Commit
Sau khi hoàn tất, chạy lệnh shell:
```
git add -A && git commit -m "phase1(kickoff): PO tạo Vision + Product Backlog"
```

## Quy tắc:
- PHẢI spawn po-agent, KHÔNG tự làm
- PHẢI git commit khi hoàn thành workflow
- Viết bằng tiếng Việt
"""
